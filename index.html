<title>Rosso Control de Tiempos</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js" defer crossorigin="anonymous"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f2f2f2;--bg2:#fff;--bg3:#f8f8f8;
  --red:#cc1a1a;--red2:#a81414;--red4:#fce8e8;
  --wh:#111;--wh2:#333;--wh3:#666;--wh4:#999;
  --border:#e0e0e0;--border2:#ccc;
  --gold:#c8860a;--gold2:#fff4e0;--gold3:#8a5a00;
  --green:#1a6e1a;--green2:#1e8a0e;--green3:#e8f5e8;
  --blue:#3050b0;--blue2:#e8eaf8;
  --mono:'Share Tech Mono',monospace;
  --head:'Rajdhani','Barlow Condensed',sans-serif;
  --body:'Barlow Condensed',-apple-system,sans-serif;
}
body{background:var(--bg);color:var(--wh);font-family:var(--body);min-height:100vh;font-size:15px}
.app{min-height:100vh}
.screen{display:none;flex-direction:column;min-height:100vh}.screen.active{display:flex}
.hdr{background:#111;border-bottom:3px solid var(--red);padding:10px 14px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:50;flex-shrink:0}
.hdr img{height:30px;width:auto}
.hdr-div{width:2px;height:28px;background:var(--red);opacity:.6;flex-shrink:0}
.hdr-t{font-size:15px;font-weight:700;color:#fff;letter-spacing:.05em;text-transform:uppercase;font-family:var(--head)}
.hdr-s{font-size:10px;color:#aaa;letter-spacing:.07em;text-transform:uppercase}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tab-bar{display:flex;background:#111;border-bottom:2px solid var(--red);overflow-x:auto;flex-shrink:0;scrollbar-width:none}
.tab-bar::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:10px 12px;text-align:center;font-size:11px;font-weight:700;color:#777;cursor:pointer;border-bottom:3px solid transparent;white-space:nowrap;letter-spacing:.06em;text-transform:uppercase;font-family:var(--head);touch-action:manipulation;user-select:none;margin-bottom:-2px;position:relative}
.tab.active{color:#ff4444;border-bottom-color:#ff4444}
.ndot{position:absolute;top:6px;right:4px;width:7px;height:7px;background:var(--red);border-radius:50%;display:none}
.ndot.show{display:block}
.body{padding:12px;flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.card-accent{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px;border-left:4px solid var(--red)}
.card-blue{background:var(--blue2);border:1px solid var(--blue);border-radius:6px;padding:12px;border-left:4px solid var(--blue)}
.card-gold{background:var(--gold2);border:1px solid var(--gold);border-radius:6px;padding:12px;border-left:4px solid var(--gold)}
.card-green{background:var(--green3);border:1px solid var(--green);border-radius:6px;padding:12px;border-left:4px solid var(--green)}
.card-err{background:var(--red4);border:1px solid var(--red);border-radius:6px;padding:12px}
.lbl{font-size:10px;font-weight:700;color:var(--red);letter-spacing:.1em;text-transform:uppercase;font-family:var(--head);margin-bottom:6px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.sel-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:4px;padding:9px 7px;font-size:11px;color:var(--wh3);cursor:pointer;text-align:center;transition:all .1s;line-height:1.4;font-family:var(--body);font-weight:600;letter-spacing:.02em;text-transform:uppercase;min-height:46px;touch-action:manipulation;user-select:none;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.sel-btn:active{transform:scale(.97)}.sel-btn.on{background:var(--red4);border-color:var(--red);color:var(--red);border-width:2px;font-weight:700}
.btn{border:none;border-radius:4px;padding:12px 16px;font-size:13px;font-weight:700;cursor:pointer;width:100%;transition:all .1s;letter-spacing:.07em;text-transform:uppercase;font-family:var(--head);touch-action:manipulation;min-height:48px;user-select:none}
.btn:active{transform:scale(.98)}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}.btn-red:disabled{opacity:.35;cursor:not-allowed;transform:none}
.btn-gold{background:var(--gold);color:#fff}
.btn-green{background:var(--green);color:#fff}
.btn-blue{background:var(--blue);color:#fff}
.btn-out{background:transparent;border:1.5px solid var(--border2);color:var(--wh2)}
.btn-sm{background:#fff;border:1px solid var(--border2);border-radius:4px;padding:6px 10px;font-size:10px;color:var(--wh3);cursor:pointer;white-space:nowrap;font-family:var(--head);font-weight:700;letter-spacing:.06em;text-transform:uppercase;touch-action:manipulation;min-height:36px}
.btn-sm:hover{border-color:var(--red);color:var(--red)}
.btn-sm.danger{border-color:var(--red);color:var(--red)}
.inp{width:100%;background:var(--bg3);border:1.5px solid var(--border2);border-radius:4px;padding:10px 12px;font-size:14px;color:var(--wh);font-family:var(--body);margin-bottom:8px}
.inp:focus{outline:none;border-color:var(--red);background:#fff;box-shadow:0 0 0 3px rgba(204,26,26,.1)}
select.inp{cursor:pointer}textarea.inp{resize:none}
.inp-plate{width:100%;background:#111;border:2.5px solid var(--red);border-radius:4px;padding:12px;font-size:24px;color:#fff;font-family:var(--mono);font-weight:700;letter-spacing:.2em;text-transform:uppercase;text-align:center}
.inp-plate:focus{outline:none;box-shadow:0 0 0 3px rgba(204,26,26,.3)}
.timer-wrap{background:#fff;border:1.5px solid var(--border);border-radius:6px;padding:24px 14px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.07)}
.timer-num{font-size:52px;font-weight:700;font-family:var(--mono);letter-spacing:4px;color:#111;line-height:1}
.timer-num.over{color:var(--red)}.timer-num.paused{color:var(--gold)}
.prog-bar{height:4px;background:var(--border);border-radius:2px;margin-top:8px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .5s}
.badge{display:inline-block;padding:2px 8px;border-radius:3px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;font-family:var(--head)}
.b-run{background:var(--green3);color:var(--green);border:1px solid var(--green)}
.b-pau{background:var(--gold2);color:var(--gold3);border:1px solid var(--gold)}
.b-over{background:var(--red4);color:var(--red);border:1px solid var(--red)}
.b-cal{background:var(--blue2);color:var(--blue);border:1px solid var(--blue)}
.b-pend{background:var(--gold2);color:var(--gold3);border:1px solid var(--gold)}
.b-done{background:var(--green3);color:var(--green);border:1px solid var(--green)}
.av{width:36px;height:36px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:var(--head);overflow:hidden;border:2px solid}
.av-tech{background:var(--red4);color:var(--red);border-color:var(--red)}
.av-jef{background:var(--green3);color:var(--green);border-color:var(--green)}
.av-adm{background:var(--blue2);color:var(--blue);border-color:var(--blue)}
.sess-row{background:#fff;border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px;position:relative}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:200;padding:12px}
.modal{background:#fff;border-radius:8px;border-top:3px solid var(--red);padding:20px;width:100%;max-width:340px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.modal-t{font-size:16px;font-weight:700;color:#111;font-family:var(--head);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.modal-s{font-size:13px;color:var(--wh3);margin-bottom:14px}
.toast-wrap{position:fixed;top:10px;right:10px;width:272px;z-index:300;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:#fff;border:1px solid var(--border2);border-radius:6px;padding:11px 13px;pointer-events:all;animation:slideIn .2s ease;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.t-over{border-left:4px solid var(--red)}.toast.t-pau{border-left:4px solid var(--gold)}
.toast.t-fin{border-left:4px solid var(--green)}.toast.t-cal{border-left:4px solid var(--blue)}
.toast.t-assign{border-left:4px solid var(--blue)}.toast.t-resume{border-left:4px solid var(--green)}
.toast-t{font-size:12px;font-weight:700;color:#111;font-family:var(--head)}.toast-s{font-size:11px;color:#666;margin-top:2px}
.toast-x{float:right;background:none;border:none;color:#aaa;cursor:pointer;font-size:13px;margin-left:8px}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.empty{text-align:center;color:var(--wh4);font-size:13px;padding:28px 0;letter-spacing:.05em;text-transform:uppercase;font-family:var(--head)}
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:5px}
@keyframes spin{to{transform:rotate(360deg)}}
.plate-tag{display:inline-block;background:#111;border-radius:3px;padding:2px 8px;font-family:var(--mono);font-size:11px;color:#fff;letter-spacing:.15em}
.row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.load-screen{position:fixed;inset:0;background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:999}
.radio-group{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px}
.radio-btn{background:var(--bg3);border:1.5px solid var(--border2);border-radius:4px;padding:7px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:var(--body);touch-action:manipulation;user-select:none}
.radio-btn.on{background:var(--red4);border-color:var(--red);color:var(--red)}
.dbg-panel{position:fixed;bottom:0;left:0;right:0;background:#000;border-top:2px solid #ff4444;z-index:400;max-height:180px;overflow-y:auto;font-family:var(--mono);font-size:10px;padding:6px 10px;display:none}
.dbg-panel.show{display:block}
.dbg-line{padding:2px 0;border-bottom:1px solid #222;color:#0f0}
.dbg-line.err{color:#f44}.dbg-line.warn{color:#fa0}.dbg-line.info{color:#4af}
.dbg-toggle{position:fixed;bottom:8px;right:8px;background:#cc1a1a;color:#fff;border:none;border-radius:50%;width:36px;height:36px;font-size:12px;cursor:pointer;z-index:401;font-weight:700}
</style>
</head>
