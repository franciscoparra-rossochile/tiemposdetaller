<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Test Simple</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px">
<h1>TEST CARGA</h1>
<div id="status">Cargando...</div>
<button onclick="testLogin()" style="padding:10px;margin:10px">LOGIN</button>
<pre id="log"></pre>

<script>
console.log('✅ Script cargado');

const SURL = 'https://jczmupcmeixpwjedfgtk.supabase.co';
const SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impjem11cGNtZWl4cHdqZWRmZ3RrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NzMxOTMsImV4cCI6MjA5MjU0OTE5M30.DuICC_pCQGv27lZivieXRRvGz9A1GNkgmhvTvyKo25o';
let sb;

async function init() {
  console.log('✅ init() llamado');
  document.getElementById('status').textContent = 'Conectando...';
  
  if (typeof supabase === 'undefined') {
    document.getElementById('status').textContent = '❌ Supabase no cargó';
    return;
  }
  
  sb = supabase.createClient(SURL, SKEY);
  console.log('✅ Cliente creado');
  document.getElementById('status').textContent = '✅ Conectado - Listo para login';
}

async function testLogin() {
  console.log('✅ testLogin() llamado');
  const log = document.getElementById('log');
  
  try {
    const {data, error} = await sb.from('users')
      .select('*')
      .eq('username', 'benjamin.cifuentes')
      .eq('password', '1234')
      .maybeSingle();
    
    if (error) {
      log.textContent = '❌ ERROR: ' + JSON.stringify(error, null, 2);
      console.error('Error login:', error);
      return;
    }
    
    if (!data) {
      log.textContent = '❌ Usuario no encontrado';
      return;
    }
    
    log.textContent = '✅ LOGIN EXITOSO:\n' + JSON.stringify(data, null, 2);
    console.log('✅ Login OK:', data);
  } catch(e) {
    log.textContent = '❌ EXCEPCIÓN: ' + e.message;
    console.error('Excepción:', e);
  }
}

window.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
